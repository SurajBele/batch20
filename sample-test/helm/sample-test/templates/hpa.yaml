apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler

metadata:
  name: sample-test

spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sample-test

  minReplicas: 8
  maxReplicas: 15

  metrics:
  - type: Resource

    resource:
      name: cpu

      target:
        type: Utilization
        averageUtilization: 50

  - type: Resource

    resource:
      name: memory

      target:
        type: Utilization
        averageUtilization: 60