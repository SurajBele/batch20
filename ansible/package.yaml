- name: package modules
  hosts: all
  become: true
  tasks:
  - name: install httpd
    package:
      name: httpd
      state: latest 
    when: ansible_os_family == "RedHat"
    
  - name: install apache2
    package:
      name: apache2
      update_cache: yes
      state: present
    when: ansible_os_family == "Debian"
    